#User table

type User @table(key: "clerkId") {
  clerkId: String! @unique
  email: String!
  username: String
  imageUrl: String
}

# Skill table

type Skill @table {
  id: UUID! @default(expr: "uuidV4()")

  author: User!

  title: String!
  description: String!
  tags: [String!]!

  installCommand: String!
  promptConfig: String!
  usageExample: String!

  createdAt: Timestamp! @default(expr: "request.time")
}
